name: Auto-create PR

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head "$GITHUB_REF_NAME" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists"
          else
            gh pr create --title "$GITHUB_REF_NAME" --body "" --base main
          fi
